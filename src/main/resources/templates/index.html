<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tienda - Inicio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .menu {
            text-align: center;
            margin: 40px 0;
        }
        .menu a {
            display: inline-block;
            padding: 15px 30px;
            margin: 0 10px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }
        .menu a:hover {
            background-color: #0056b3;
        }
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        .feature-box {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        .feature-box h3 {
            color: #007bff;
            margin-top: 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Bienvenido a la Tienda</h1>

    <div class="menu">
        <a href="/items">Ver todos los productos</a>
    </div>
</div>
</body>
</html>
