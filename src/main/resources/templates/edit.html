<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-top: 0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-link {
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #666;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

    </style>
</head>
<body>
<div class="container" th:object="${item}">
    <div class="header">
        <h1>Editar Producto</h1>
        <a th:href="@{'/item/' + *{id}}" class="back-link">← Cancelar</a>
    </div>

    <form th:action="@{'/item/' + *{id} + '/edit'}" method="post">
        <div class="form-group">
            <label for="title">Título:</label>
            <input type="text" id="title" name="title" th:value="*{title}" required>
        </div>

        <div class="form-group">
            <label for="price">Precio (€):</label>
            <input type="number" id="price" name="price" step="0.01" th:value="*{price}" required>
        </div>

        <div class="form-group">
            <label for="description">Descripción:</label>
            <textarea id="description" name="description" th:text="*{description}"></textarea>
        </div>

        <div class="form-group">
            <label for="category">Categoría:</label>
            <select id="category" name="category" required>
                <option th:each="cat : ${categories}"
                        th:value="${cat}"
                        th:text="${cat}"
                        th:selected="${cat == item.category}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label for="image">URL de la imagen:</label>
            <input type="url" id="image" name="image" th:value="*{image}">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="rate">Puntuación (0-5):</label>
                <input type="number" id="rate" name="rate" step="0.1" min="0" max="5" th:value="*{rate}">
            </div>

            <div class="form-group">
                <label for="count">Stock:</label>
                <input type="number" id="count" name="count" min="0" th:value="*{count}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="color">Color:</label>
                <input type="text" id="color" name="color" th:value="*{color}">
            </div>

            <div class="form-group">
                <label for="manufacturer">Fabricante:</label>
                <input type="text" id="manufacturer" name="manufacturer" th:value="*{manufacturer}">
            </div>
        </div>

        <div class="form-group">
            <label for="ean">Código EAN:</label>
            <input type="text" id="ean" name="ean" th:value="*{EAN}">
            <div class="help-text">Código de barras del producto</div>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-save">Guardar cambios</button>
            <a th:href="@{'/item/' + *{id}}" class="btn btn-cancel">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
